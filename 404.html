<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - AllWrite</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --main-yellow: #f0b470;
      --deep-bg: #0f172a; 
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-dim: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
      color: #ffffff;
      text-align: center;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(240, 180, 112, 0.2); 
      padding: 50px 30px; 
      border-radius: 40px;
      width: 90%; 
      max-width: 550px; 
      position: relative;
      z-index: 2;
      box-shadow: 
        0 40px 80px rgba(0, 0, 0, 0.6),
        inset 0 0 20px rgba(240, 180, 112, 0.05);
      animation: float 6s ease-in-out infinite;
    }

    .logo {
      /* Changed to Outfit to match the rest of the UI */
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 800; /* Increased weight to match headings */
      color: var(--main-yellow);
      margin-bottom: 20px;
      display: inline-block;
      letter-spacing: -1px;
      text-shadow: 0 0 15px rgba(240, 180, 112, 0.3);
    }

    h1 {
      font-size: clamp(4rem, 15vw, 7.5rem); 
      line-height: 1;
      font-weight: 800;
      color: var(--main-yellow);
      margin-bottom: 15px;
      letter-spacing: -2px; 
      text-transform: uppercase;
      
      text-shadow: 
        0 1px 0 #b87a33,
        0 2px 0 #b87a33,
        0 3px 0 #b87a33,
        0 15px 35px rgba(240, 180, 112, 0.3);
    }

    h2 { 
      font-size: 1.5rem; 
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 15px;
      letter-spacing: 3px;
      color: #f8fafc;
      opacity: 0.9;
    }

    p { 
      margin-bottom: 35px; 
      font-size: 1.05rem;
      color: var(--text-dim); 
      font-weight: 400;
      line-height: 1.6;
      max-width: 80%;
      margin-left: auto;
      margin-right: auto;
    }

    .btn {
      display: inline-block;
      padding: 16px 45px;
      background: var(--main-yellow);
      color: #020617;
      text-decoration: none;
      border-radius: 18px;
      font-weight: 800;
      font-size: 1rem;
      text-transform: uppercase;
      transition: all 0.1s cubic-bezier(0, 0, 0, 1);
      box-shadow: 0 8px 0 #b87a33;
      position: relative;
      top: 0;
    }

    .btn:hover {
      top: -3px;
      box-shadow: 0 11px 0 #b87a33;
      filter: brightness(1.1);
    }

    .btn:active {
      top: 6px;
      box-shadow: 0 2px 0 #b87a33;
    }

    .grid {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: radial-gradient(rgba(240, 180, 112, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  
  <div class="card">
    <div class="logo">AllWrite</div>
    
    <h1>ERROR</h1>
    <h2>PAGE NOT FOUND</h2>
    <p>You wandered off the path! Let's get you back on track.</p>
    
    <a href="https://allwrite-sh.vercel.app/allow" class="btn">Resume Lesson</a>
  </div>
</body>
</html>
